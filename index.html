<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #1a1a1a; /* fallback, senada sama warna gelap di gambar */
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /*
    KUNCI UTAMANYA DI SINI:
    - Aspect ratio dikunci PERSIS sama kaya gambar aslinya (465 x 939)
    - Jadi di layar HP berapapun ukurannya, proporsi gambar & posisi form
      tetap presisi, nggak akan geser/melenceng.
  */
  .phone-frame {
    position: relative;
    width: min(465px, 100vw);
    aspect-ratio: 465 / 939;
    background-image: url('bg-login.jpg');
    background-size: cover;
    background-position: center;
  }

  /* Semua elemen form diposisikan pakai persen (%), relatif ke .phone-frame */
  .overlay-el {
    position: absolute;
    background: transparent;
    border: none;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  /* Tombol back di pojok kiri atas gambar */
  .btn-back {
    top: 2%;
    left: 4%;
    width: 10%;
    height: 4%;
    cursor: pointer;
  }

  /* Input "Nomor ponsel atau email" */
  #email {
    top: 38.5%;
    left: 4.3%;
    width: 91.4%;
    height: 7%;
    padding-left: 5%;
    color: #ffffff;       /* warna teks yang diketik user */
    font-size: 16px;       /* min 16px penting biar gak auto-zoom di iOS */
    caret-color: #ffffff;
  }

  /* Input "Kata sandi" */
  #password {
    top: 48.4%;
    left: 4.3%;
    width: 91.4%;
    height: 7%;
    padding-left: 5%;
    color: #ffffff;
    font-size: 16px;
    caret-color: #ffffff;
  }

  /* Tombol "Login" (bentuk pill abu-abu sudah ada di gambar) */
  .btn-login {
    top: 58%;
    left: 4.3%;
    width: 91.4%;
    height: 5%;
    cursor: pointer;
    /* teks disembunyikan karena tulisan "Login" udah ada di gambar */
    font-size: 0;
    color: transparent;
  }

  /* Link "Lupa kata sandi?" */
  .btn-forgot {
    top: 65.5%;
    left: 25%;
    width: 50%;
    height: 3.5%;
    cursor: pointer;
  }
</style>
</head>
<body>

  <div class="phone-frame">

    <button type="button" class="overlay-el btn-back" aria-label="Kembali" onclick="history.back()"></button>

    <form id="loginForm">
      <input type="text" id="email" class="overlay-el" autocomplete="username" required>
      <input type="password" id="password" class="overlay-el" autocomplete="current-password" required>
      <button type="submit" class="overlay-el btn-login">Login</button>
    </form>

    <a href="#" class="overlay-el btn-forgot" aria-label="Lupa kata sandi"></a>

  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      alert('Login diproses (dummy, belum terhubung ke server).');
    });
  </script>

</body>
</html>
