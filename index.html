<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;

    /* GANTI URL DI BAWAH INI DENGAN GAMBAR KAMU SENDIRI */
    /* Bisa pakai file lokal, contoh: background-image: url('bg.jpg'); */
    background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1600');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }

  .login-box {
    width: 100%;
    max-width: 380px;
    padding: 40px 32px;
    margin: 20px;

    /* INI KUNCI EFEK TRANSPARANNYA */
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);

    color: #fff;
  }

  .login-box h1 {
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .login-box p.subtitle {
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    margin-bottom: 28px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    color: rgba(255,255,255,0.9);
  }

  .form-group input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: 0.2s ease;
  }

  .form-group input::placeholder {
    color: rgba(255,255,255,0.6);
  }

  .form-group input:focus {
    background: rgba(255, 255, 255, 0.25);
    border-color: rgba(255, 255, 255, 0.6);
  }

  .options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    margin-bottom: 22px;
    color: rgba(255,255,255,0.85);
  }

  .options a {
    color: #fff;
    text-decoration: none;
  }
  .options a:hover { text-decoration: underline; }

  button.btn-login {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.9);
    color: #222;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s ease;
  }

  button.btn-login:hover {
    background: #fff;
    transform: translateY(-1px);
  }

  .register-text {
    text-align: center;
    font-size: 13px;
    margin-top: 20px;
    color: rgba(255,255,255,0.8);
  }

  .register-text a {
    color: #fff;
    font-weight: 600;
    text-decoration: none;
  }
  .register-text a:hover { text-decoration: underline; }
</style>
</head>
<body>

  <div class="login-box">
    <h1>Selamat Datang</h1>
    <p class="subtitle">Masuk untuk melanjutkan ke akun kamu</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="nama@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Kata Sandi</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="options">
        <label><input type="checkbox" style="width:auto; margin-right:6px;"> Ingat saya</label>
        <a href="#">Lupa password?</a>
      </div>

      <button type="submit" class="btn-login">Masuk</button>
    </form>

    <p class="register-text">Belum punya akun? <a href="#">Daftar sekarang</a></p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Login diproses (ini masih dummy, belum terhubung ke server).');
    });
  </script>

</body>
</html>
